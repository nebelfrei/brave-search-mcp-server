# Optional Compose override for Docker secrets.
#
# Usage:
#   1. cp secrets/brave_api_key.txt.example secrets/brave_api_key.txt
#   2. Add your API key to secrets/brave_api_key.txt
#   3. docker compose -f docker-compose.yml -f docker-compose.secrets.example.yml up --build
#
# See https://docs.docker.com/compose/how-tos/use-secrets/

services:
  mcp-server:
    environment:
      BRAVE_API_KEY_FILE: /run/secrets/brave_api_key
    secrets:
      - brave_api_key

secrets:
  brave_api_key:
    file: ./secrets/brave_api_key.txt
